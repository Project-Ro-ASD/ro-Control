<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background card -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#141a12"/>

  <!-- Ring track -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="#1e2e1a" stroke-width="10"/>

  <!-- Progress ring ~270° -->
  <circle cx="128" cy="128" r="88"
    fill="none"
    stroke="#76b900"
    stroke-width="10"
    stroke-linecap="round"
    stroke-dasharray="414 553"
    stroke-dashoffset="138"
    transform="rotate(-90 128 128)"/>

  <!-- Inner glow circles -->
  <circle cx="128" cy="128" r="62" fill="#76b900" opacity="0.10"/>
  <circle cx="128" cy="128" r="44" fill="#76b900" opacity="0.16"/>

  <!-- Up arrow shaft -->
  <line x1="128" y1="160" x2="128" y2="106"
    stroke="#76b900" stroke-width="9"
    stroke-linecap="round"/>

  <!-- Arrow left leg -->
  <line x1="128" y1="105" x2="108" y2="128"
    stroke="#76b900" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow right leg -->
  <line x1="128" y1="105" x2="148" y2="128"
    stroke="#76b900" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ring end cap dot -->
  <circle cx="128" cy="40" r="7" fill="#76b900"/>
</svg>
