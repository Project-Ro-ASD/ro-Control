name: CI

on:
  push:
    branches: [main, dev, feature/**, fix/**]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            cmake \
            extra-cmake-modules \
            gcc-c++ \
            ninja-build \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            qt6-qtwayland-devel \
            kf6-qqc2-desktop-style \
            polkit-devel \
            clang-tools-extra \
            qt6-qtbase-private-devel

      - name: Configure (CMake)
        run: |
          cmake -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Check formatting (clang-format)
        run: |
          find src \( -name "*.cpp" -o -name "*.h" \) -print0 | \
          xargs -0 clang-format --dry-run --Werror

  package-rpm:
    name: RPM Build Check
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install RPM tooling and dependencies
        run: |
          dnf install -y \
            git \
            rpm-build \
            rpmlint \
            cmake \
            extra-cmake-modules \
            gcc-c++ \
            ninja-build \
            qt6-qtbase-devel \
            qt6-qtbase-private-devel \
            qt6-qtdeclarative-devel \
            qt6-qtwayland-devel \
            kf6-qqc2-desktop-style \
            polkit-devel

      - name: Prepare source tarball
        run: |
          VERSION="$(awk '/^Version:/ {print $2}' packaging/rpm/ro-control.spec)"
          if [[ -z "${VERSION}" ]]; then
            echo "Failed to read Version from packaging/rpm/ro-control.spec" >&2
            exit 1
          fi
          ARCHIVE_BASENAME="ro-control-${VERSION}"
          mkdir -p ~/rpmbuild/SOURCES ~/rpmbuild/SPECS
          tar \
            --exclude-vcs \
            --exclude='./build' \
            --exclude='./build-*' \
            --transform="s,^,${ARCHIVE_BASENAME}/," \
            -czf "${HOME}/rpmbuild/SOURCES/${ARCHIVE_BASENAME}.tar.gz" \
            .
          cp packaging/rpm/ro-control.spec "${HOME}/rpmbuild/SPECS/ro-control.spec"

      - name: Build RPM
        run: |
          rpmbuild -ba "${HOME}/rpmbuild/SPECS/ro-control.spec" \
            --define "_topdir ${HOME}/rpmbuild"

      - name: Lint built RPMs
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm || true
